<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Fleet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        #command-header {
            height: 50px;
            background: #020617;
            border-bottom: 2px solid #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            color: #38bdf8;
            font-family: monospace;
            z-index: 100;
            flex-shrink: 0;
        }

        #game-container {
            flex-grow: 1;
            position: relative;
            background-color: #020617;
            overflow: hidden;
            /* Restrict touch only on the game area */
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .glow-title {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.8), 
                         0 0 20px rgba(56, 189, 248, 0.4);
            animation: title-glow 2.5s ease-in-out infinite alternate;
        }

        @keyframes title-glow {
            from { text-shadow: 0 0 10px rgba(56, 189, 248, 0.8), 0 0 20px rgba(56, 189, 248, 0.4); }
            to { text-shadow: 0 0 20px rgba(56, 189, 248, 1), 0 0 40px rgba(14, 165, 233, 0.6); }
        }

        #orientation-warning {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(2, 6, 23, 0.98); 
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 2rem;
            touch-action: none;
        }
        @media (orientation: portrait) {
            #orientation-warning { display: flex; }
        }

        .heavy-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fbbf24;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
            z-index: 50;
            line-height: 1;
        }
        .heavy-btn:active {
            background: rgba(251, 191, 36, 0.4);
            transform: scale(0.9);
        }
        .btn-label { font-size: 9px; opacity: 0.8; margin-bottom: 2px; }
        .ammo-value { font-size: 24px; font-weight: 900; }
        
        .hidden { display: none !important; }

        .rotate-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            stroke: #38bdf8;
            filter: drop-shadow(0 0 8px rgba(56,189,248,0.6));
        }

        /* Leaderboard Rows */
        .leaderboard-row {
            display: grid;
            grid-template-columns: 35px 1fr 90px;
            gap: 0 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            align-items: center;
        }
        .leaderboard-date {
            font-size: 10px;
            opacity: 0.4;
            margin-top: 1px;
            color: #94a3b8;
        }

        .fs-btn {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 10px;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .fs-btn:active {
            background: rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

<div id="orientation-warning">
    <svg class="rotate-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2" transform="rotate(90 12 12)" opacity="0.3"/>
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <path d="M12 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3"/>
        <path d="M18 8a6 6 0 0 1 0 8" opacity="0.6"/>
        <polyline points="15 6 18 8 15 10" opacity="0.6"/>
    </svg>
    <h1 class="glow-title text-4xl font-black italic tracking-tighter uppercase">ROTATE YOUR PHONE</h1>
</div>

<div id="command-header">
    <!-- Top Left: Fullscreen Toggle -->
    <div class="flex items-center">
        <button id="btn-fullscreen-hud" class="fs-btn">Fullscreen</button>
    </div>

    <!-- Top Right: Score and Ships Lost -->
    <div class="flex gap-6 items-center">
        <div class="flex flex-col justify-center items-end">
            <span class="text-[10px] uppercase opacity-50 tracking-widest leading-tight">Score</span>
            <span id="score-hud" class="font-bold text-xl leading-none text-white">0</span>
        </div>
        <div class="flex flex-col justify-center items-end">
            <span class="text-[10px] uppercase opacity-50 tracking-widest leading-tight">Lost</span>
            <span id="ships-lost-hud" class="font-bold text-xl leading-none text-rose-500">0</span>
        </div>
    </div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="heavy-cannon-btn" class="heavy-btn hidden">
        <span class="btn-label">HEAVY</span>
        <span id="btn-ammo-count" class="ammo-value">5</span>
        <span class="btn-label">CANNON</span>
    </div>
</div>

<div id="overlay-screen" class="fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-start p-6 text-center overflow-y-auto">
    <div class="max-w-md w-full flex flex-col items-center py-8">
        <h1 id="overlay-title" class="glow-title text-5xl font-black text-white italic tracking-tighter mb-8">DARK FLEET</h1>
        
        <div id="submission-panel" class="hidden mb-8 w-full p-4 border border-sky-500/20 rounded bg-slate-900/50">
            <p class="text-sky-400 font-mono text-xs mb-3 uppercase tracking-widest">NEW HIGH SCORE DETECTED. IDENTIFY YOURSELF:</p>
            <div class="flex gap-2">
                <input type="text" id="player-name" maxlength="12" placeholder="CALLSIGN" class="flex-grow bg-slate-950 border border-sky-500/50 text-white px-4 py-2 rounded focus:outline-none focus:border-sky-400 font-mono text-sm uppercase">
                <button id="btn-submit" class="bg-sky-600 px-6 py-2 text-white font-bold rounded hover:bg-sky-500 transition-colors text-sm uppercase">Save</button>
            </div>
        </div>

        <button id="btn-action" class="px-14 py-4 bg-sky-500 hover:bg-sky-400 text-white font-black text-xl rounded-full transition-all shadow-[0_0_40px_rgba(14,165,233,0.4)] border-b-4 border-sky-800 active:translate-y-1 mb-12">ENTER ASTEROID FIELD</button>
        
        <div id="leaderboard-panel" class="w-full max-w-xs p-4 bg-slate-900/50 border border-sky-500/20 rounded-lg">
            <h2 class="text-sky-500 font-bold text-[10px] tracking-[0.2em] uppercase mb-4 text-center">Top Fleet Pilots</h2>
            <div id="leaderboard-content" class="text-slate-300 font-mono text-xs">
                <div class="text-center py-2 opacity-50 italic">SYNCING ARCHIVES...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGWK4hWfRhjtpuQz9l2JrCGmJd8_XnhP_ZU6_LEnaSxedztgs5gDvGWuj0B_4Gpp8A/exec";
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    const heavyBtn = document.getElementById('heavy-cannon-btn');
    const btnAmmoEl = document.getElementById('btn-ammo-count');
    
    const SCROLL_SPEED_START = 1.8;
    const LASER_SPEED = 20;
    const HEAVY_LASER_SPEED = 16; 
    const FINGER_OFFSET_X = 100;
    const SPREAD_DURATION = 900; 

    let game = {
        score: 0,
        ammo: 5,
        lives: 3,
        running: false,
        scrollSpeed: SCROLL_SPEED_START, 
        time: 0,
        targetX: 140,
        targetY: 0,
        spreadTime: 0,
        shipsLost: 0,
        finalScore: 0,
        topScores: []
    };

    let ship = { x: 140, y: 0, radius: 14, cooldown: 0, invincible: 0, glow: 0, glowColor: "" };
    let entities = { asteroids: [], lasers: [], particles: [], stars: [], bonuses: [], floatingTexts: [] };

    function initStars() {
        entities.stars = [];
        for(let i = 0; i < 100; i++) {
            entities.stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: 0.5 + Math.random() * 2, 
                speed: 0.5 + Math.random() * 1.5
            });
        }
    }

    function spawnAsteroid() {
        const size = 10 + Math.random() * 25;
        let bonusType = 0; 
        const rand = Math.random();
        if (rand < 0.01) bonusType = 1;       
        else if (rand < 0.015) bonusType = 2;  
        else if (rand < 0.025) bonusType = 3; 
        const difficultyMult = 1 + (game.time / 20000); 
        const baseHealth = bonusType > 0 ? (size / 8) : (size / 15);
        const ast = {
            x: canvas.width + size + 50,
            y: Math.random() * canvas.height,
            vx: - (game.scrollSpeed + Math.random() * 0.8),
            vy: (Math.random() - 0.5) * 0.4,
            radius: size,
            angle: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.04,
            health: Math.ceil(baseHealth * difficultyMult),
            bonusType: bonusType,
            vertices: []
        };
        for(let i = 0; i < 8; i++) ast.vertices.push(0.8 + Math.random() * 0.4);
        entities.asteroids.push(ast);
    }

    function spawnBonus(x, y, type) {
        entities.bonuses.push({ x, y, vx: -game.scrollSpeed * 0.7, radius: 12, angle: 0, type: type });
    }

    function spawnFloatingText(x, y, text, color) {
        entities.floatingTexts.push({ x, y, text, color, life: 1.0, decay: 0.015 });
    }

    function createExplosion(x, y, color, count = 15, speed = 14) {
        for(let i = 0; i < count; i++) {
            entities.particles.push({
                x, y, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed,
                life: 1.0, decay: 0.015 + Math.random() * 0.025, color
            });
        }
    }

    function formatDate(dateStr) {
        if (!dateStr) return "UNKNOWN";
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
    }

    async function syncLeaderboard() {
        try {
            const response = await fetch(SCRIPT_URL);
            const top10 = await response.json();
            game.topScores = top10;
            const container = document.getElementById('leaderboard-content');
            if (!top10 || top10.length === 0) {
                container.innerHTML = '<div class="text-center py-2 opacity-30 italic">NO DATA IN ARCHIVE</div>';
                return;
            }
            container.innerHTML = top10.map(s => `
                <div class="leaderboard-row">
                    <span class="opacity-50 text-center font-bold">#${s.rank}</span>
                    <div class="flex flex-col justify-center min-w-0">
                        <span class="truncate uppercase text-slate-100 font-bold">${s.player}</span>
                        <span class="leaderboard-date">${s.date}</span>
                    </div>
                    <span class="text-right text-sky-400 font-bold">${s.score.toLocaleString()}</span>
                </div>
            `).join('');
        } catch (e) {
            console.error("Archive sync error", e);
        }
    }

    async function submitScore() {
        const nameInput = document.getElementById('player-name');
        const playerName = nameInput.value.trim() || "UNKNOWN";
        
        const now = new Date();
        const dd = String(now.getDate()).padStart(2, '0');
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const yyyy = now.getFullYear();
        // Construct the date string as DD/MM/YYYY
        const formattedDate = `${dd}/${mm}/${yyyy}`;

        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').innerText = "...";
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({ 
                    player: playerName, 
                    score: game.finalScore,
                    date: formattedDate
                })
            });
            document.getElementById('submission-panel').classList.add('hidden');
            setTimeout(syncLeaderboard, 1000);
        } catch (e) {
            console.error("Transmission failure", e);
        }
    }

    function update() {
        if(!game.running) return;
        game.time++;
        const speedMult = game.spreadTime > 0 ? 1.3 : 1.0;
        game.scrollSpeed = SCROLL_SPEED_START + (game.time / 15000);

        const ease = 0.12;
        ship.x += (game.targetX - ship.x) * ease;
        ship.y += (game.targetY - ship.y) * ease;

        if (ship.x < ship.radius) ship.x = ship.radius;
        if (ship.x > canvas.width - ship.radius) ship.x = canvas.width - ship.radius;
        if (ship.y < ship.radius) ship.y = ship.radius;
        if (ship.y > canvas.height - ship.radius) ship.y = canvas.height - ship.radius;

        if (ship.invincible > 0) ship.invincible--;
        if (ship.cooldown > 0) ship.cooldown--;
        if (game.spreadTime > 0) game.spreadTime--;
        if (ship.glow > 0) ship.glow -= 0.035;

        if (game.time % 14 === 0) {
            if (game.spreadTime > 0) {
                fireLaser('#38bdf8', 1, false, 0); fireLaser('#60a5fa', 1, false, -0.22); fireLaser('#60a5fa', 1, false, 0.22);    
            } else { fireLaser('#38bdf8', 1, false, 0); }
        }

        entities.stars.forEach(s => { s.x -= s.speed * (game.scrollSpeed * 0.15) * speedMult; if (s.x < 0) s.x = canvas.width; });
        if (Math.random() < 0.012 + (game.time / 80000)) spawnAsteroid();

        for (let i = entities.asteroids.length - 1; i >= 0; i--) {
            const a = entities.asteroids[i];
            a.x += a.vx * speedMult; a.y += a.vy * speedMult; a.angle += a.rotSpeed * speedMult;
            if (a.x < -a.radius - 50) { entities.asteroids.splice(i, 1); continue; }
            if (ship.invincible <= 0) {
                if (Math.hypot(ship.x - a.x, ship.y - a.y) < a.radius + ship.radius - 4) {
                    createExplosion(ship.x, ship.y, '#f43f5e', 30);
                    game.lives--; ship.invincible = 120; game.spreadTime = 0; entities.asteroids.splice(i, 1);
                    if (game.lives <= 0) endGame();
                }
            }
        }

        for (let i = entities.bonuses.length - 1; i >= 0; i--) {
            const b = entities.bonuses[i];
            b.x += b.vx * speedMult; b.angle += 0.06 * speedMult;
            if (Math.hypot(ship.x - b.x, ship.y - b.y) < b.radius + ship.radius + 40) { 
                let pColor = "";
                if (b.type === 1) { game.ammo += 5; ship.glow = 1.0; ship.glowColor = '#fbbf24'; pColor = '#fbbf24'; }
                else if (b.type === 2) { if (game.lives < 5) game.lives++; ship.glow = 1.0; ship.glowColor = '#f43f5e'; pColor = '#f43f5e'; }
                else if (b.type === 3) { game.spreadTime = SPREAD_DURATION; ship.glow = 1.0; ship.glowColor = '#3b82f6'; pColor = '#3b82f6'; } 
                game.score += 100; spawnFloatingText(b.x, b.y, "+ 100", pColor); entities.bonuses.splice(i, 1); continue;
            }
            if (b.x < -50) entities.bonuses.splice(i, 1);
        }

        for (let i = entities.lasers.length - 1; i >= 0; i--) {
            const l = entities.lasers[i];
            l.x += l.vx * speedMult; l.y += l.vy * speedMult; let hit = false;
            for (let j = entities.asteroids.length - 1; j >= 0; j--) {
                const a = entities.asteroids[j];
                if (Math.hypot(l.x - a.x, l.y - a.y) < a.radius + 8) { 
                    if (l.isHeavy) a.health = 0; else { a.health -= l.power; hit = true; }
                    if (a.health <= 0) {
                        const clr = a.bonusType === 1 ? '#fbbf24' : (a.bonusType === 2 ? '#f43f5e' : (a.bonusType === 3 ? '#3b82f6' : '#475569'));
                        createExplosion(a.x, a.y, clr, 12); game.score += 20; if (a.bonusType > 0) spawnBonus(a.x, a.y, a.bonusType); entities.asteroids.splice(j, 1);
                    }
                    if (!l.isHeavy) break;
                }
            }
            if ((!l.isHeavy && hit) || l.x > canvas.width + 100 || l.x < -100 || l.y < -100 || l.y > canvas.height + 50) entities.lasers.splice(i, 1);
        }

        for (let i = entities.particles.length - 1; i >= 0; i--) {
            const p = entities.particles[i]; p.x += (p.vx - game.scrollSpeed) * speedMult; p.y += p.vy * speedMult; p.life -= p.decay;
            if (p.life <= 0) entities.particles.splice(i, 1);
        }

        for (let i = entities.floatingTexts.length - 1; i >= 0; i--) {
            const t = entities.floatingTexts[i]; t.y -= 1.5; t.x -= game.scrollSpeed * speedMult; t.life -= t.decay;
            if (t.life <= 0) entities.floatingTexts.splice(i, 1);
        }

        draw(); updateUI(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; entities.stars.forEach(s => { ctx.globalAlpha = 0.4 + (s.speed / 4); ctx.fillRect(s.x, s.y, s.size, s.size); });
        ctx.globalAlpha = 1.0;
        entities.asteroids.forEach(a => {
            ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.angle); ctx.fillStyle = '#020617'; 
            let color = "#334155";
            
            if (a.bonusType > 0 && a.bonusType !== 3) {
                const pulse = 0.5 + Math.sin(game.time * 0.1) * 0.5;
                color = a.bonusType === 1 ? `rgba(251, 191, 36, ${0.5 + pulse * 0.5})` : `rgba(244, 63, 94, ${0.5 + pulse * 0.5})`;
                ctx.shadowBlur = 10 * pulse; ctx.shadowColor = color;
            }
            
            ctx.strokeStyle = color; ctx.lineWidth = (a.bonusType > 0 && a.bonusType !== 3) ? 2.5 : 1.2;
            ctx.beginPath(); for(let i=0; i<a.vertices.length; i++) {
                const ang = (i / a.vertices.length) * Math.PI * 2; const r = a.radius * a.vertices[i];
                if (i === 0) ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r); else ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
            }
            ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
        });
        entities.bonuses.forEach(b => {
            ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.angle);
            let color = b.type === 1 ? "#fbbf24" : (b.type === 2 ? "#f43f5e" : "#3b82f6");
            ctx.fillStyle = color; ctx.shadowBlur = 15; ctx.shadowColor = color;
            if (b.type === 1) { ctx.fillRect(-6, -6, 12, 12); ctx.strokeStyle = "white"; ctx.strokeRect(-4, -4, 8, 8); }
            else if (b.type === 2) { ctx.fillRect(-7, -2, 14, 4); ctx.fillRect(-2, -7, 4, 14); }
            else if (b.type === 3) { ctx.beginPath(); ctx.moveTo(0, -9); ctx.lineTo(8, 6); ctx.lineTo(-8, 6); ctx.closePath(); ctx.fill(); ctx.strokeStyle = "white"; ctx.stroke(); }
            ctx.restore();
        });
        entities.lasers.forEach(l => {
            ctx.save(); ctx.shadowBlur = l.isHeavy ? 35 : 10; ctx.shadowColor = l.color;
            const h = l.isHeavy ? 12 : 5; const w = l.isHeavy ? 70 : 25;
            ctx.fillStyle = l.color; ctx.fillRect(l.x, l.y - h/2, w, h);
            if (l.isHeavy) { ctx.fillStyle = "#fff"; ctx.fillRect(l.x + 5, l.y - h/6, w - 10, h/3); }
            ctx.restore();
        });
        if (ship.glow > 0) {
            ctx.save(); ctx.beginPath(); ctx.arc(ship.x, ship.y, ship.radius + (1 - ship.glow) * 120, 0, Math.PI * 2); ctx.strokeStyle = ship.glowColor; ctx.lineWidth = 10 * ship.glow; ctx.globalAlpha = ship.glow * 0.6; ctx.stroke(); ctx.restore();
        }
        if (ship.invincible % 10 < 5) {
            ctx.save(); ctx.translate(ship.x, ship.y);
            const engines = game.spreadTime > 0 ? {c:'#f59e0b', s:20, sc:'#ea580c', l:45} : {c:'#f59e0b', s:0, sc:'', l:20};
            ctx.fillStyle = engines.c; ctx.shadowBlur = engines.s; ctx.shadowColor = engines.sc;
            ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(-engines.l - Math.random() * 20, 0); ctx.lineTo(-10, 5); ctx.fill();
            ctx.strokeStyle = game.spreadTime > 0 ? "#60a5fa" : "#38bdf8"; if (ship.glow > 0) { ctx.strokeStyle = ship.glowColor; ctx.shadowBlur = 15; ctx.shadowColor = ship.glowColor; }
            ctx.lineWidth = 2.2; ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(-14, -9); ctx.lineTo(-8, 0); ctx.lineTo(-14, 9); ctx.closePath(); ctx.stroke();
            let ovalW = 6; if (game.spreadTime > 0) { ovalW += Math.sin(game.time * 0.15) * 1.5; ctx.fillStyle = "#60a5fa"; ctx.shadowBlur = 10; ctx.shadowColor = "#60a5fa"; } else ctx.fillStyle = "#0ea5e9";
            ctx.beginPath(); ctx.ellipse(0, 0, Math.max(1, ovalW), 3, 0, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            if (game.spreadTime > 0) {
                const barWidth = 30; const ratio = game.spreadTime / SPREAD_DURATION;
                ctx.fillStyle = "rgba(59, 130, 246, 0.2)"; ctx.fillRect(-barWidth/2, -22, barWidth, 3);
                ctx.fillStyle = "rgba(59, 130, 246, 0.6)"; ctx.fillRect(-barWidth/2, -22, barWidth * ratio, 3);
            }
            ctx.font = "8px monospace"; ctx.textAlign = "center"; ctx.fillStyle = "rgba(244, 63, 94, 0.5)"; ctx.fillText("▮".repeat(Math.max(0, game.lives)), 0, 22);
            ctx.restore();
        }
        entities.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.font = "bold 14px monospace"; ctx.textAlign = "center";
        entities.floatingTexts.forEach(t => { ctx.globalAlpha = t.life; ctx.fillStyle = t.color; ctx.fillText(t.text, t.x, t.y); });
        ctx.globalAlpha = 1.0;
    }

    function fireLaser(color, power, isHeavy, angle) {
        const spd = isHeavy ? HEAVY_LASER_SPEED : LASER_SPEED;
        entities.lasers.push({ x: ship.x + 15, y: ship.y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, color, power, isHeavy });
    }

    function updateUI() {
        document.getElementById('score-hud').innerText = game.score.toString();
        document.getElementById('ships-lost-hud').innerText = game.shipsLost.toString();
        btnAmmoEl.innerText = game.ammo;
    }

    function endGame() {
        game.running = false;
        game.shipsLost++;
        game.finalScore = game.score; 
        updateUI();
        
        heavyBtn.classList.add('hidden');
        document.getElementById('overlay-screen').classList.remove('hidden');
        document.getElementById('overlay-title').innerText = "DARK SHIP LOST";
        document.getElementById('btn-action').innerText = "SEND ANOTHER DARK SHIP";
        
        let qualifies = false;
        if (game.topScores.length < 10) {
            qualifies = true;
        } else {
            const minScore = Math.min(...game.topScores.map(s => s.score));
            if (game.finalScore > minScore) {
                qualifies = true;
            }
        }

        if (qualifies && game.finalScore > 0) {
            document.getElementById('submission-panel').classList.remove('hidden');
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-submit').innerText = "SAVE";
        } else {
            document.getElementById('submission-panel').classList.add('hidden');
        }
        
        syncLeaderboard();
    }

    function startGame() {
        game.score = 0; game.ammo = 5; game.lives = 3; game.time = 0; game.spreadTime = 0; game.scrollSpeed = SCROLL_SPEED_START;
        game.targetX = 140; game.targetY = canvas.height / 2;
        ship.x = 140; ship.y = canvas.height / 2; ship.glow = 0;
        entities = { asteroids: [], lasers: [], particles: [], stars: [], bonuses: [], floatingTexts: [] };
        initStars();
        game.running = true;
        heavyBtn.classList.remove('hidden');
        document.getElementById('overlay-screen').classList.add('hidden');
        document.getElementById('submission-panel').classList.add('hidden');
        requestAnimationFrame(update);
    }

    function toggleFullscreen() {
        const doc = window.document;
        const docEl = doc.documentElement;

        const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

        if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
            if (requestFullScreen) requestFullScreen.call(docEl);
        } else {
            if (cancelFullScreen) cancelFullScreen.call(doc);
        }
    }

    const handleInput = (e) => {
        if (!game.running) return;
        const input = e.touches ? e.touches[0] : e;
        const btnRect = heavyBtn.getBoundingClientRect();
        if (input.clientX > btnRect.left - 25 && input.clientY > btnRect.top - 25) return;
        const containerRect = container.getBoundingClientRect();
        game.targetX = input.clientX + FINGER_OFFSET_X;
        game.targetY = input.clientY - containerRect.top;
    };

    window.addEventListener('touchstart', handleInput);
    window.addEventListener('touchmove', (e) => { 
        if (game.running) {
            e.preventDefault(); 
            handleInput(e); 
        }
    }, { passive: false });
    window.addEventListener('mousemove', (e) => { if (e.buttons > 0 && game.running) handleInput(e); });
    
    heavyBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (game.ammo > 0 && ship.cooldown <= 0) {
            if (game.spreadTime > 0) { fireLaser('#fbbf24', 10, true, 0); fireLaser('#fbbf24', 10, true, -0.15); fireLaser('#fbbf24', 10, true, 0.15); }
            else { fireLaser('#fbbf24', 10, true, 0); }
            game.ammo--; ship.cooldown = 25; createExplosion(ship.x + 25, ship.y, '#fbbf24', 25, 20); updateUI();
        }
    });

    document.getElementById('btn-action').addEventListener('click', startGame);
    document.getElementById('btn-submit').addEventListener('click', submitScore);
    document.getElementById('btn-fullscreen-hud').addEventListener('click', toggleFullscreen);
    
    function resize() {
        const r = container.getBoundingClientRect();
        if (r.width > 0) { canvas.width = r.width; canvas.height = r.height; initStars(); }
    }
    window.addEventListener('resize', resize);
    resize();
    syncLeaderboard();
</script>
</body>
</html>
